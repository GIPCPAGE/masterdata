id: ig.mdm.fhir.common
canonical: https://www.cpage.fr/ig/masterdata/common
name: IGMdmFhirCommon
status: draft
version: 0.1.0
date: 2026-02-11
title: CPage MasterData - IG FHIR Générique
publisher:
  name: CPage
  url: https://www.cpage.fr
contact:
  - name: CPage
    telecom:
      - system: email
        value: contact@cpage.fr
description: >-
  IG FHIR générique pour l'échange des concepts métiers et des nomenclatures avec le CPage Master Data.
  Ce guide définit les profils et ressources communs, réutilisables et vendor-neutral,
  basés sur FR Core. Il sert de socle pour les IG spécifiques (ex: CPage).
fhirVersion: 4.0.1
copyrightYear: 2026
releaseLabel: ci-build
jurisdiction: urn:iso:std:iso:3166#FR "FRANCE"

parameters:
  shownav: true
  special-url:
    - https://smt.esante.gouv.fr/fhir/CodeSystem/TRE-R13-CommuneOM
    - https://smt.esante.gouv.fr/fhir/ValueSet/fr-communes-actives
    - https://smt.esante.gouv.fr/fhir/ValueSet/fr-communes-cog-complet
  
dependencies:
  hl7.fhir.fr.core: 2.1.0

